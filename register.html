<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Agrimindvest</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .register-container {
            max-width: 450px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .register-title {
            text-align: center;
            color: var(--accent-light);
            margin-bottom: 8px;
            font-size: 1.5em;
        }

        .register-subtitle {
            text-align: center;
            color: var(--text-dim);
            margin-bottom: 25px;
            font-size: 0.9em;
        }

        .form-group {
            animation: slideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            opacity: 0;
        }

        .form-group:nth-child(1) { animation-delay: 0.05s; }
        .form-group:nth-child(2) { animation-delay: 0.12s; }
        .form-group:nth-child(3) { animation-delay: 0.19s; }
        .form-group:nth-child(4) { animation-delay: 0.26s; }
        .form-group:nth-child(5) { animation-delay: 0.33s; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .btn-submit {
            margin-top: 20px;
            animation: slideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            animation-delay: 0.4s;
            opacity: 0;
        }

        .ref-hint {
            font-size: 0.75em;
            color: var(--text-dim);
            margin-top: 4px;
        }

        .bonus-badge {
            display: inline-block;
            background: rgba(255,193,7,0.2);
            color: var(--gold);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            margin-left: 6px;
            animation: softPulse 2s infinite;
        }

        @keyframes softPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .password-field {
            position: relative;
        }

        .password-field .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-dim);
            transition: all 0.3s;
        }

        .password-field .toggle-password:hover {
            color: var(--accent);
        }

        .form-input:focus {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <!-- Back Header -->
    <div class="back-header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
        <span style="color:var(--accent-light);font-weight:700;">AGV</span>
    </div>

    <!-- Register Form -->
    <div class="register-container">
        <h2 class="register-title">✨ Create Your Account</h2>
        <p class="register-subtitle">Start earning from agricultural knowledge</p>

        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>👤 Full Name</label>
                <input type="text" class="form-input" id="regName" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label>📧 Email Address</label>
                <input type="email" class="form-input" id="regEmail" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>📱 Phone Number</label>
                <input type="tel" class="form-input" id="regPhone" placeholder="Enter your phone number" required>
            </div>

            <div class="form-group">
                <label>🔒 Password</label>
                <div class="password-field">
                    <input type="password" class="form-input" id="regPassword" placeholder="Create a password" required minlength="4">
                    <i class="fas fa-eye toggle-password" onclick="togglePassword('regPassword', this)"></i>
                </div>
            </div>

            <div class="form-group">
                <label>🎁 Referral Code <span class="bonus-badge">₦300 Bonus</span></label>
                <input type="text" class="form-input" id="regRefCode" value="ADMIN" placeholder="Enter referral code">
                <p class="ref-hint">💡 Default: ADMIN. Enter a friend's code to help them earn!</p>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-submit">
                ✨ CREATE FREE ACCOUNT
            </button>
        </form>

        <p style="text-align:center;margin-top:20px;color:var(--text-dim);font-size:0.9em;">
            Already registered? <a href="login.html" style="color:var(--accent-light);">Login →</a>
        </p>

        <p style="text-align:center;margin-top:10px;color:var(--text-dim);font-size:0.8em;">
            🔒 Secure Registration • 🎁 ₦300 Welcome Bonus
        </p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="assets/js/firebase.js"></script>
    <script>
        // ============ PASSWORD TOGGLE ============
        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // ============ CHECK REFERRAL FROM URL ============
        window.addEventListener('load', () => {
            const url = window.location.href;
            if (url.includes('/ref/')) {
                const refCode = url.split('/ref/')[1]?.split('?')[0]?.split('#')[0];
                if (refCode) {
                    document.getElementById('regRefCode').value = refCode;
                    toast('🎁 Referral code applied: ' + refCode);
                }
            }

            const savedRef = localStorage.getItem('agv_ref');
            if (savedRef && !url.includes('/ref/')) {
                document.getElementById('regRefCode').value = savedRef;
                localStorage.removeItem('agv_ref');
            }

            const savedUser = localStorage.getItem('agv_u');
            if (savedUser) {
                try {
                    const user = JSON.parse(savedUser);
                    if (user && user.id) {
                        window.location.href = 'home.html';
                    }
                } catch (e) {}
            }
        });

        // ============ HANDLE REGISTRATION ============
        async function handleRegister(event) {
            event.preventDefault();

            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim().toLowerCase();
            const phone = document.getElementById('regPhone').value.trim();
            const password = document.getElementById('regPassword').value;
            let refCode = document.getElementById('regRefCode').value.trim();

            if (!name || !email || !phone || !password) {
                return toast('Please fill all required fields');
            }

            if (password.length < 4) {
                return toast('Password must be at least 4 characters');
            }

            if (!refCode) {
                refCode = 'ADMIN';
                document.getElementById('regRefCode').value = 'ADMIN';
            }

            try {
                const emailCheck = await db.collection('users')
                    .where('email', '==', email)
                    .get();

                if (!emailCheck.empty) {
                    return toast('Email already registered. Please login.');
                }

                const userId = generateUserId();

                let referredBy = 'ADMIN';
                if (refCode && refCode !== 'ADMIN') {
                    const refCheck = await db.collection('users')
                        .where('refCode', '==', refCode)
                        .get();
                    if (!refCheck.empty) {
                        referredBy = refCheck.docs[0].id;
                    }
                }

                const newUser = {
                    id: userId,
                    name: name,
                    email: email,
                    phone: phone,
                    password: password,
                    balance: WELCOME_BONUS,
                    totalEarned: WELCOME_BONUS,
                    tasksCompleted: 0,
                    plan: 'none',
                    status: 'active',
                    refCode: userId,
                    referredBy: referredBy,
                    refEarnings: 0,
                    refCount: 0,
                    ownedPlans: [],
                    invested: false,
                    investmentAmount: 0,
                    createdAt: new Date().toISOString()
                };

                await setDoc('users', userId, newUser);

                await db.collection('referrals').add({
                    referrerId: referredBy,
                    refereeId: userId,
                    refereeName: name,
                    date: new Date().toISOString(),
                    level: 1,
                    earned: 0,
                    status: 'pending'
                });

                if (referredBy !== 'ADMIN') {
                    const refDoc = await db.collection('users').doc(referredBy).get();
                    if (refDoc.exists) {
                        await updateDoc('users', referredBy, {
                            refCount: (refDoc.data().refCount || 0) + 1
                        });
                    }
                }

                await db.collection('deposits').add({
                    userId: userId,
                    userName: name,
                    amount: WELCOME_BONUS,
                    channel: 'bonus',
                    date: new Date().toISOString(),
                    status: 'approved',
                    ref: 'WELCOME-BONUS',
                    note: 'Welcome bonus on registration'
                });

                localStorage.setItem('agv_u', JSON.stringify(newUser));

                toast('🎉 Account created! ₦' + WELCOME_BONUS + ' welcome bonus added!');
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 1000);

            } catch (error) {
                console.error('Registration error:', error);
                toast('Registration failed. Please try again.');
            }
        }
    </script>
</body>
</html>
