<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Agrimindvest</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .login-container {
            max-width: 450px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .login-title {
            text-align: center;
            color: var(--accent-light);
            margin-bottom: 8px;
            font-size: 1.5em;
            animation: fadeSlideDown 0.5s ease;
        }

        .login-subtitle {
            text-align: center;
            color: var(--text-dim);
            margin-bottom: 25px;
            font-size: 0.9em;
            animation: fadeSlideDown 0.5s ease 0.1s forwards;
            opacity: 0;
        }

        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            opacity: 0;
        }

        .form-group:nth-child(1) { animation-delay: 0.15s; }
        .form-group:nth-child(2) { animation-delay: 0.25s; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-submit {
            margin-top: 10px;
            animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            animation-delay: 0.35s;
            opacity: 0;
        }

        .password-field {
            position: relative;
        }

        .password-field .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-dim);
            transition: all 0.3s;
        }

        .password-field .toggle-password:hover {
            color: var(--accent);
        }

        .forgot-link {
            display: block;
            text-align: right;
            color: var(--text-dim);
            font-size: 0.8em;
            margin-top: -8px;
            margin-bottom: 15px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }

        .forgot-link:hover {
            color: var(--accent-light);
        }

        .form-input:focus {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <!-- Back Header -->
    <div class="back-header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
        <span style="color:var(--accent-light);font-weight:700;">AGV</span>
    </div>

    <!-- Login Form -->
    <div class="login-container">
        <h2 class="login-title">🔐 Welcome Back</h2>
        <p class="login-subtitle">Login to continue earning</p>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>📧 Email Address</label>
                <input type="email" class="form-input" id="loginEmail" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>🔒 Password</label>
                <div class="password-field">
                    <input type="password" class="form-input" id="loginPassword" placeholder="Enter your password" required>
                    <i class="fas fa-eye toggle-password" onclick="togglePassword('loginPassword', this)"></i>
                </div>
            </div>

            <a href="#" class="forgot-link" onclick="forgotPassword()">Forgot password?</a>

            <button type="submit" class="btn btn-primary btn-block btn-submit">
                🔐 LOGIN
            </button>
        </form>

        <p style="text-align:center;margin-top:20px;color:var(--text-dim);font-size:0.9em;animation: slideUp 0.5s ease 0.45s forwards;opacity:0;">
            New here? <a href="register.html" style="color:var(--accent-light);">Create Account →</a>
        </p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="assets/js/firebase.js"></script>
    <script>
        // ============ PASSWORD TOGGLE ============
        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // ============ FORGOT PASSWORD ============
        function forgotPassword() {
            toast('📧 Contact support: ' + ADMIN_EMAIL + ' to reset your password.');
        }

        // ============ CHECK IF ALREADY LOGGED IN ============
        window.addEventListener('load', () => {
            const savedUser = localStorage.getItem('agv_u');
            if (savedUser) {
                try {
                    const user = JSON.parse(savedUser);
                    if (user && user.id) {
                        window.location.href = 'home.html';
                    }
                } catch (e) {}
            }
        });

        // ============ HANDLE LOGIN ============
        async function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('loginEmail').value.trim().toLowerCase();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                return toast('Please fill all fields');
            }

            const btn = document.querySelector('.btn-submit');
            btn.disabled = true;
            btn.textContent = 'Logging in...';

            try {
                const snapshot = await db.collection('users')
                    .where('email', '==', email)
                    .where('password', '==', password)
                    .get();

                if (snapshot.empty) {
                    btn.disabled = false;
                    btn.textContent = '🔐 LOGIN';
                    return toast('Invalid email or password. Please try again.');
                }

                const user = { id: snapshot.docs[0].id, ...snapshot.docs[0].data() };

                if (user.status === 'suspended') {
                    btn.disabled = false;
                    btn.textContent = '🔐 LOGIN';
                    return toast('⚠️ Your account has been suspended. Contact support: ' + ADMIN_EMAIL);
                }

                localStorage.setItem('agv_u', JSON.stringify(user));

                toast('Welcome back, ' + user.name + '! 🎉');
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 600);

            } catch (error) {
                console.error('Login error:', error);
                btn.disabled = false;
                btn.textContent = '🔐 LOGIN';
                toast('Login failed. Please try again.');
            }
        }
    </script>
</body>
</html>
